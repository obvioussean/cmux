name: Auto-sync upstream and build (fork)

# Periodically merges manaflow-ai/cmux:main into the long-lived feature branch
# in this fork. On a clean merge, the existing nightly build workflow is
# dispatched against the feature branch to produce a fresh .dmg artifact. On a
# merge conflict, the conflicted state is pushed to a temporary branch, a PR is
# opened against the feature branch, and Copilot Coding Agent (CCA) is asked to
# resolve the conflict markers.
#
# Designed to live on the feature branch in the fork. The top-level repository
# guard prevents this workflow from doing anything if it ever ends up upstream
# via PR.

on:
  schedule:
    # 14:00 UTC daily (~7am PT / 6am PST). Picked to land before the user's
    # workday so a fresh build is ready by morning.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip dispatching the nightly build after a clean merge"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: write
  id-token: write

env:
  FEATURE_BRANCH: obvioussean/bell-tab-indicator
  UPSTREAM_REPO: manaflow-ai/cmux
  UPSTREAM_BRANCH: main
  ALLOWED_REPO: obvioussean/cmux

concurrency:
  group: auto-sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'obvioussean/cmux'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      result: ${{ steps.merge.outputs.result }}
      merged_sha: ${{ steps.merge.outputs.merged_sha }}
      conflict_branch: ${{ steps.merge.outputs.conflict_branch }}
      upstream_sha: ${{ steps.merge.outputs.upstream_sha }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FEATURE_BRANCH }}
          fetch-depth: 0
          persist-credentials: true
          # Submodules intentionally not checked out: we only need parent-tree
          # merge logic, and skipping submodules keeps this job fast.
          submodules: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

      - name: Attempt merge of upstream/${{ env.UPSTREAM_BRANCH }}
        id: merge
        run: |
          set -euo pipefail
          UPSTREAM_REF="upstream/${UPSTREAM_BRANCH}"
          UPSTREAM_SHA=$(git rev-parse "${UPSTREAM_REF}")
          UPSTREAM_SHORT=${UPSTREAM_SHA:0:7}
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "${UPSTREAM_SHA}" HEAD; then
            echo "Already up to date with ${UPSTREAM_REF} (${UPSTREAM_SHORT})."
            echo "result=nochange" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MERGE_MSG="Merge upstream/${UPSTREAM_BRANCH} (${UPSTREAM_SHORT}) into ${FEATURE_BRANCH}"
          if git merge --no-ff --no-edit -m "${MERGE_MSG}" "${UPSTREAM_REF}"; then
            MERGED_SHA=$(git rev-parse HEAD)
            echo "Clean merge produced ${MERGED_SHA}."
            git push origin "HEAD:${FEATURE_BRANCH}"
            echo "result=clean" >> "$GITHUB_OUTPUT"
            echo "merged_sha=${MERGED_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conflicted: stage everything (including conflict markers), commit
          # the WIP state on a temp branch, and push so Copilot can resolve.
          CONFLICT_BRANCH="auto-sync/conflicts-$(date -u +%Y%m%d-%H%M%S)"
          echo "Merge conflicts detected; staging WIP on ${CONFLICT_BRANCH}."
          git add -A
          git commit --no-verify -m "WIP: conflicts merging upstream/${UPSTREAM_BRANCH} (${UPSTREAM_SHORT})" -m "Auto-generated by .github/workflows/auto-sync-upstream.yml. Conflict markers left in tree for Copilot Coding Agent to resolve."
          git checkout -B "${CONFLICT_BRANCH}"
          git push origin "${CONFLICT_BRANCH}" --force-with-lease
          echo "result=conflict" >> "$GITHUB_OUTPUT"
          echo "conflict_branch=${CONFLICT_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Upstream sync"
            echo
            echo "- result: \`${{ steps.merge.outputs.result }}\`"
            echo "- upstream sha: \`${{ steps.merge.outputs.upstream_sha }}\`"
            echo "- merged sha: \`${{ steps.merge.outputs.merged_sha }}\`"
            echo "- conflict branch: \`${{ steps.merge.outputs.conflict_branch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  request-conflict-resolution:
    needs: sync
    if: github.repository == 'obvioussean/cmux' && needs.sync.outputs.result == 'conflict'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Open PR and delegate to Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFLICT_BRANCH: ${{ needs.sync.outputs.conflict_branch }}
          UPSTREAM_SHA: ${{ needs.sync.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          BODY_FILE=$(mktemp)
          cat >"$BODY_FILE" <<EOF
          Auto-merge of \`upstream/${UPSTREAM_BRANCH}\` (\`${UPSTREAM_SHA}\`) into
          \`${FEATURE_BRANCH}\` produced merge conflicts. Conflict markers were
          committed as-is on this branch.

          @copilot please resolve the conflict markers in this PR. Guidance:

          - Preserve the bell-tab-indicator changes from \`${FEATURE_BRANCH}\`
            (the feature this fork carries on top of upstream).
          - Apply upstream changes for everything else, deferring to upstream's
            new APIs / signatures when they evolve.
          - After resolving, run a quick build check:
            \`xcodebuild -scheme cmux -configuration Debug -destination 'platform=macOS' -derivedDataPath /tmp/cmux-conflict-check CODE_SIGNING_ALLOWED=NO build\`
          - Once green, push the resolved commits and the merge will land.

          Triggered by [\`auto-sync-upstream.yml\`](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          EOF

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base "${FEATURE_BRANCH}" \
            --head "${CONFLICT_BRANCH}" \
            --title "Auto-sync: resolve conflicts merging upstream/${UPSTREAM_BRANCH}" \
            --body-file "$BODY_FILE")
          echo "Opened PR: $PR_URL"
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          # Best-effort: assign Copilot to trigger CCA. If the token cannot
          # assign Copilot (org policy / missing subscription), the @copilot
          # mention in the body still pings the agent.
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --add-assignee Copilot \
            || echo "Could not assign Copilot directly; relying on @copilot mention in body."

          {
            echo "### Conflict PR"
            echo
            echo "- PR: $PR_URL"
            echo "- branch: \`${CONFLICT_BRANCH}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: sync
    if: |
      github.repository == 'obvioussean/cmux'
      && needs.sync.outputs.result == 'clean'
      && (github.event_name != 'workflow_dispatch' || inputs.skip_build != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch nightly build for ${{ env.FEATURE_BRANCH }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # nightly.yml on a non-main ref builds a universal Release .dmg and
          # uploads it as a workflow artifact (it skips the publish-to-main-tag
          # path when should_publish=false). Pass force=true so it doesn't no-op
          # on the "no new commits since last nightly tag" check (which only
          # applies to main anyway).
          gh workflow run nightly.yml \
            --repo "${{ github.repository }}" \
            --ref "${FEATURE_BRANCH}" \
            -f force=true
          echo "Dispatched nightly.yml for ${FEATURE_BRANCH}."
          {
            echo "### Build dispatched"
            echo
            echo "- workflow: \`nightly.yml\`"
            echo "- ref: \`${FEATURE_BRANCH}\`"
            echo "- merged sha: \`${{ needs.sync.outputs.merged_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
